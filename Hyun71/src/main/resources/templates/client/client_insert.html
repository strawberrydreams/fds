<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고객 정보 입력</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>

<header class="py-2 bg-dark text-white">
    <div class="container">
        <h1>고객 정보 입력</h1>
    </div>
</header>

<section class="container mt-4">
    <div class="card">
        <div class="card-body">

            <!--<form th:object="${clientDTO}" th:action="@{/ClientInsert}" method="post">-->
            <form th:object="${clientDTO}"
                  th:action="@{/ClientInsert}"
                  method="post"
                  id="sign_client"
                  data-mode="insert">

                <div class="mb-3">
                    <label>아이디</label>
                    <input type="text" th:field="*{userId}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>비밀번호</label>
                    <input type="password" th:field="*{userPw}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>이름</label>
                    <input type="text" th:field="*{name}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>이메일</label>
                    <input type="email" th:field="*{email}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>성별</label><br>
                    <input type="radio" th:field="*{gender}" value="M"> 남
                    <input type="radio" th:field="*{gender}" value="F"> 여
                </div>

                <div class="mb-3">
                    <label>생년월일</label>
                    <input type="date" th:field="*{birth}" class="form-control">
                </div>

                <button class="btn btn-success">등록</button>
                <a th:href="@{/ClientSelect}" class="btn btn-secondary">취소</a>

            </form>

        </div>
    </div>
</section>

<!-- 유효성 검사 JS -->
<script th:src="@{/js/client_validity.js}"></script>

</body>
</html>
