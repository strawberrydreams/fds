<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <th:block th:replace="~{fragments/header :: common_head('차단 해제 신청 | FDS BANK')}"></th:block>
    <style>
        .main-content { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 70px); padding: 40px 0; }
        .unblock-container { background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        .unblock-title { text-align: center; font-size: 24px; font-weight: bold; color: #007bff; margin-bottom: 25px; }
        .info-box { background: #e7f1ff; color: #0056b3; padding: 15px; border-radius: 8px; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #444; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background-color: #f8f9fa; font-weight: bold; }
        .btn-unblock { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-unblock:hover { background-color: #0056b3; transform: translateY(-1px); }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: menu_and_widget}"></nav>

<div class="main-content">
    <div class="unblock-container">
        <div class="unblock-title">🔓 계좌 차단 해제 신청</div>
        <div class="info-box">
            <b>주의사항:</b> 본인 확인 후 신청이 가능하며, 관리자의 소명 자료 검토 후 영업일 기준 1~3일 내에 처리됩니다.
        </div>
        <div class="form-group">
            <label>차단된 내 계좌번호</label>
            <input type="text" id="myAccount" readonly th:value="${member != null ? member.accountNum : '정보 없음'}">
        </div>
        <button type="button" class="btn-unblock" onclick="requestUnblock()">차단 해제 신청 접수</button>
    </div>
</div>

<script>
    function requestUnblock() {
        const acc = document.getElementById('myAccount').value;
        if(acc === '정보 없음') return alert("등록된 계좌 정보를 찾을 수 없습니다.");

        if(!confirm("해당 계좌의 차단 해제를 신청하시겠습니까?")) return;

        // [API 통신 로직 유지]
        fetch(`/api/reports/unblock/${acc}`, { method: 'PATCH' })
            .then(res => {
                if(res.ok) {
                    alert("차단 해제 신청이 정상적으로 접수되었습니다.");
                    location.href = "/";
                } else {
                    alert("신청 대상 계좌가 아니거나 이미 신청된 상태입니다.");
                }
            })
            .catch(err => alert("서버 통신 중 오류가 발생했습니다."));
    }
</script>
</body>
</html>
