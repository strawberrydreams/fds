<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <th:block th:replace="~{fragments/header :: common_head('가입 완료 | 안심거래 서비스')}"></th:block>
    <style>
        :root { --brand-blue: #007bff; } /* 파란색 고정 */
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f9; margin: 0; }
        .result-container { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 70px); }
        .result-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        .info-box { text-align: left; background: #f8f9fa; padding: 25px; border-radius: 8px; margin: 25px 0; font-size: 14px; border: 1px solid #eef0f2; }
        .info-item { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .info-item:last-child { border-bottom: none; }
        .info-item strong { color: #555; display: inline-block; width: 120px; }
        .answer-text { color: var(--brand-blue); font-weight: bold !important; }
        .btn-home { display: inline-block; width: 100%; padding: 14px; background: var(--brand-blue); color: white; text-decoration: none; border-radius: 6px; font-weight: bold; box-sizing: border-box; transition: background 0.2s; }
        .btn-home:hover { background: #0056b3; }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: menu_and_widget}"></nav>

<div class="result-container">
    <div class="result-card">
        <div style="font-size: 50px; margin-bottom: 10px;">🎉</div>
        <h2 style="color: #2ecc71; margin-top: 0;">회원가입 완료!</h2>
        <p><strong th:text="${memberDTO.name}">사용자</strong>님 환영합니다.</p>
        <div class="info-box">
            <div class="info-item"><strong>아이디</strong> <span th:text="${memberDTO.userId}"></span></div>
            <div class="info-item"><strong>이메일</strong> <span th:text="${memberDTO.userEmail}"></span></div>
            <div class="info-item"><strong>생년월일</strong> <span th:text="${memberDTO.birth}"></span></div>
            <hr style="border: 0; border-top: 1px dashed #ddd; margin: 15px 0;">
            <div class="info-item"><strong>본인확인 질문</strong> <span th:text="${memberDTO.pwQuestion}"></span></div>
            <div class="info-item"><strong>본인확인 답변</strong> <span class="answer-text" th:text="${memberDTO.pwAnswer}"></span></div>
        </div>
        <a th:href="@{/login}" class="btn-home">로그인하러 가기</a>
    </div>
</div>

</body>
</html>
