<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>카드 해지 신청 - FDS BANK</title>
    <th:block th:replace="~{fragments/header :: common_head('FDS BANK - 카드 해지')}"></th:block>
    <style>
        .container { max-width: 700px; margin: 50px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .card-selector { margin: 25px 0; border: 1px solid #eee; border-radius: 10px; overflow: hidden; }
        .card-option { display: flex; align-items: center; padding: 20px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .card-option:last-child { border-bottom: none; }
        .card-option:hover { background: #f8f9fa; }
        .card-option input[type="radio"] { margin-right: 20px; width: 20px; height: 20px; cursor: pointer; }

        .mini-card-icon { width: 50px; height: 30px; border-radius: 4px; margin-right: 15px; }
        .mini-card-icon.CHECK { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .mini-card-icon.CREDIT { background: linear-gradient(135deg, #434343, #000); }

        .card-info { flex-grow: 1; }
        .card-info strong { display: block; font-size: 16px; color: #333; }
        .card-info span { font-size: 12px; color: #888; }

        .auth-section { margin-top: 30px; padding-top: 25px; border-top: 2px solid #007bff; }
        .input-pw { width: 100%; padding: 15px; font-size: 20px; text-align: center; letter-spacing: 8px; border: 1px solid #ddd; border-radius: 8px; margin: 15px 0; }
        .btn-submit { width: 100%; padding: 15px; background: #dc3545; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: menu_and_widget}"></div>

<div class="container">
    <h2>🗑️ 카드 해지 신청</h2>
    <p style="color: #666; font-size: 14px;">해지하실 카드를 선택하고 비밀번호를 입력해주세요.</p>

    <div th:if="${error}" th:text="${error}" style="padding:10px; background:#fff5f5; color:#c53030; border-radius:5px; margin-bottom:20px; text-align:center;"></div>

    <form th:action="@{/card/update-status}" method="post">
        <input type="hidden" name="status" value="TERMINATED">

        <div class="card-selector">
            <label th:each="card : ${cards}" class="card-option">
                <input type="radio" name="cardId" th:value="${card.cardId}"
                       th:checked="${card.cardId == defaultCardId}" required>
                <div class="mini-card-icon" th:classappend="${card.cardType}"></div>
                <div class="card-info">
                    <strong th:text="${card.cardNumber}">0000-0000-0000-0000</strong>
                    <span th:text="${card.cardType + ' 카드 | 연결: ' + card.account.accountNumber}">CHECK</span>
                </div>
            </label>
        </div>

        <div th:if="${#lists.isEmpty(cards)}" style="text-align: center; padding: 40px; color: #999;">
            해지 가능한 카드가 없습니다.
        </div>

        <div class="auth-section" th:if="${not #lists.isEmpty(cards)}">
            <label style="font-weight: bold;">계좌 비밀번호 확인</label>
            <input type="password" name="password" class="input-pw" maxlength="4" placeholder="••••" required>
            <button type="submit" class="btn-submit" onclick="return confirm('카드를 해지하면 즉시 사용이 중지되며 복구가 불가능합니다. 계속하시겠습니까?')">해지 완료하기</button>
        </div>
    </form>
</div>

</body>
</html>
