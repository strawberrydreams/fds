# 1. Application & Server
spring.application.name=FDS
server.port=8088
server.address=127.0.0.1
server.servlet.context-path=/

# 2. Encoding & Message (UTF-8)
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
spring.messages.encoding=UTF-8
spring.thymeleaf.encoding=UTF-8

# 3. View (Thymeleaf)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# 4. Datasource & DB Profile (Oracle)
spring.profiles.active=ora
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=scott
spring.datasource.password=tiger

# 5. JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.main.allow-bean-definition-overriding=true

# 6. MyBatis Mapping
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=kdt.fds.user.dto.response
mybatis.mapper-locations=classpath:mapper/**/*.xml

# 7. External Features & Integrations
google.vision.credentials.path=${GOOGLE_VISION_KEY_PATH:classpath:google-key.json}
fds.snapshots.base-path=snapshots
spring.messages.basename=messages
spring.devtools.restart.enabled=false
