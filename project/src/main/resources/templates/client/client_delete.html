<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>고객 정보 삭제</title>

    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
</head>
<body>

<header class="py-2 bg-dark text-white">
    <div class="container">
        <h1>고객 정보 삭제</h1>
    </div>
</header>

<section class="container mt-4">
    <div class="card">
        <div class="card-body">

            <form th:action="@{/ClientDelete}" method="post" th:object="${clientDTO}">

                <input type="hidden" th:field="*{clientNo}">

                <div class="mb-3">
                    <label>아이디</label>
                    <input type="text" th:field="*{userId}" class="form-control" readonly>
                </div>

                <button type="submit" class="btn btn-danger">삭제</button>
                <a th:href="@{/ClientSelect}" class="btn btn-secondary">취소</a>

            </form>

        </div>
    </div>
</section>

</body>
</html>
